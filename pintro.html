<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultimate Challenge SAISON 1</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="home.css">
  <link rel="stylesheet" href="pintro.css">
</head>
<body class="pintro-page">
  <div class="pintro-starcoin-badge" id="pintroStarcoinBadge">💎 0</div>
  <div class="settings-wrap">
    <button type="button" class="settings-btn" id="settingsBtn" aria-label="Settings" data-i18n="settings">Paramètres</button>
    <div class="settings-dropdown" id="settingsDropdown">
      <div class="settings-option">
        <span class="settings-label" data-i18n="language">Langue</span>
        <select id="langSelect" aria-label="Language">
          <option value="fr" data-i18n="lang_fr">Français</option>
          <option value="en" data-i18n="lang_en">English</option>
          <option value="es" data-i18n="lang_es">Español</option>
          <option value="zh" data-i18n="lang_zh">中文</option>
        </select>
      </div>
      <div class="settings-option">
        <a href="createur.html" class="settings-createur-link" id="pintroCreateurLink">Page créateur</a>
      </div>
    </div>
  </div>

  <h1 class="pintro-title" id="homeTitle">Ultimate Challenge SAISON 1</h1>

  <div class="pintro-box">
    <h2 class="pintro-warning-title" data-i18n="modal_warning_title">Attention</h2>
    <p class="pintro-warning-text" data-i18n="modal_warning_text">Si vous perdez une épreuve, vous devrez recommencer le jeu depuis le début.</p>
    <a href="index.html" class="pintro-btn" id="pintroBtn" data-i18n="modal_btn_start">Commencer</a>
    <a href="macompo.html" class="pintro-btn pintro-btn-secondary" id="pintroMacompoBtn" data-i18n="pintro_macompo">Ma composition</a>
    <a href="game-football.html" class="pintro-btn pintro-btn-game" id="pintroGameFootBtn">⚽ Game football</a>
  </div>

  <nav class="pintro-bottom-bar" aria-label="Options">
    <a href="#" class="pintro-bottom-link" id="pintroQuete" data-i18n="pintro_quete">Quête</a>
    <a href="#" class="pintro-bottom-link" id="pintroMarche" data-i18n="pintro_marche">Marché</a>
    <a href="#" class="pintro-bottom-link" id="pintroEchange" data-i18n="pintro_echange">Échange</a>
    <a href="boutiquefoot.html" class="pintro-bottom-link" id="pintroBoutique" data-i18n="pintro_boutique">Boutique</a>
  </nav>

  <script src="lang.js"></script>
  <script src="textes-modales.js"></script>
  <script>
    (function() {
      var btn = document.getElementById('settingsBtn');
      var dropdown = document.getElementById('settingsDropdown');
      var langSelect = document.getElementById('langSelect');
      var pintroBtn = document.getElementById('pintroBtn');

      if (pintroBtn) {
        pintroBtn.addEventListener('click', function(e) {
          sessionStorage.setItem('clement-from-pintro', '1');
          try {
            localStorage.setItem('clement-game-completed', '0');
            localStorage.removeItem('clement-bonus-used');
            localStorage.removeItem('clement-bonus2-used');
          } catch (err) {}
        });
      }

      if (btn && dropdown) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          dropdown.classList.toggle('open');
        });
      }
      document.addEventListener('click', function() {
        if (dropdown) dropdown.classList.remove('open');
      });
      if (dropdown) dropdown.addEventListener('click', function(e) { e.stopPropagation(); });

      if (langSelect) {
        langSelect.addEventListener('change', function() {
          window.setLang(this.value);
        });
      }

      var saved = localStorage.getItem('clement-game-lang') || 'fr';
      if (langSelect) langSelect.value = saved;
      window.setLang(saved);

      function updateStarcoinBadge() {
        var el = document.getElementById('pintroStarcoinBadge');
        if (!el) return;
        var sc = parseInt(localStorage.getItem('clement-starcoin'), 10) || 0;
        el.textContent = '💎 ' + sc.toLocaleString('fr-FR');
      }
      updateStarcoinBadge();
    })();
  </script>
</body>
</html>
