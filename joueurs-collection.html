<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collection de joueurs - Ultimate Challenge</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="boutique.css">
  <style>
    .collection-page { justify-content: flex-start; padding-top: 3rem; padding-bottom: 2rem; }
    .collection-title { font-size: 1.8rem; margin-bottom: 0.5rem; text-align: center; }
    .collection-desc { font-size: 0.95rem; opacity: 0.85; margin-bottom: 1.5rem; text-align: center; }
    .collection-nav { margin-bottom: 1.5rem; text-align: center; }
    .collection-nav a { color: #f0c14b; text-decoration: none; font-weight: 600; }
    .collection-nav a:hover { text-decoration: underline; }
    .collection-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; max-width: 560px; margin: 0 auto; }
    .collection-card { text-align: center; background: rgba(255,255,255,0.06); border-radius: 12px; padding: 0.75rem; border: 1px solid rgba(255,255,255,0.12); }
    .collection-card img { width: 100%; height: auto; border-radius: 8px; display: block; }
    .collection-card-ovr { font-size: 0.85rem; opacity: 0.9; color: #f0c14b; }
    .collection-table-wrap { max-width: 900px; margin: 0 auto 2.5rem; overflow-x: auto; }
    .collection-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; background: rgba(255,255,255,0.06); border-radius: 12px; overflow: hidden; }
    .collection-table th, .collection-table td { padding: 0.6rem 0.9rem; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .collection-table th { background: rgba(255,255,255,0.1); font-weight: 700; color: #f0c14b; }
    .collection-table tr:last-child td { border-bottom: none; }
    .collection-table td:first-child { font-weight: 600; white-space: nowrap; }
    .collection-table td:nth-child(2) { color: #f0c14b; white-space: nowrap; }
    .collection-table td:nth-child(3) { opacity: 0.9; }
    .collection-section-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.75rem; color: #eee; }
  </style>
</head>
<body class="boutique-page collection-page">
  <a href="pintro.html" class="back-home">← Retour</a>
  <a href="boutique.html" class="boutique-starcoin-badge" style="text-decoration: none; color: inherit;">Boutique</a>

  <h1 class="collection-title">Collection de joueurs</h1>
  <p class="collection-desc">Tous les joueurs pouvant être obtenus (packs 25k à 75k + pack spécial 55k).</p>
  <nav class="collection-nav"><a href="boutique.html">← Retour à la boutique</a></nav>

  <p class="collection-section-title" style="margin-bottom: 1rem;">Tous les joueurs (plus rares en haut)</p>
  <div id="collectionRoot" class="boutique-main"></div>

  <script src="joueurs-data.js"></script>
  <script>
    (function() {
      var list = window.JOUEURS_COLLECTION;
      if (!list) return;

      var root = document.getElementById('collectionRoot');
      if (!root) return;

      var sorted = list.slice().sort(function(a, b) { return b.ovr - a.ovr; });
      var grid = document.createElement('div');
      grid.className = 'collection-grid';
      sorted.forEach(function(p) {
        var card = document.createElement('div');
        card.className = 'collection-card';
        var img = document.createElement('img');
        img.src = p.image;
        img.alt = '';
        img.loading = 'lazy';
        card.appendChild(img);
        grid.appendChild(card);
      });
      root.appendChild(grid);
    })();
  </script>
</body>
</html>
